---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb
  namespace: metallb
spec:
  project: default
  source:
    repoURL: https://github.com/galavernag/k8s-homelab
    targetRevision: HEAD
    path: infrastructure/metallb
  destination:
    server: https://kubernetes.default.svc
    namespace: metallb
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - Validate=false
      - CreateNamespace=true

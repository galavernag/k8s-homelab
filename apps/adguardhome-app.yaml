---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: adguardhome
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.trofimoff.net/api/v4/projects/32/packages/helm/stable
    chart: adguardhome
    targetRevision: 0.1.9
    helm:
     valuesObject:
       replicaCount: 1
       service:
        type: LoadBalancer
  destination:
    server: https://kubernetes.default.svc
    namespace: networking
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - Validate=false
      - CreateNamespace=true